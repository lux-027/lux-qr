<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- QR Code pattern -->
  <g filter="url(#glow)">
    <!-- Corner squares -->
    <rect x="40" y="40" width="30" height="30" rx="4" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
    <rect x="47" y="47" width="16" height="16" rx="2" fill="white"/>
    
    <rect x="130" y="40" width="30" height="30" rx="4" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
    <rect x="137" y="47" width="16" height="16" rx="2" fill="white"/>
    
    <rect x="40" y="130" width="30" height="30" rx="4" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
    <rect x="47" y="137" width="16" height="16" rx="2" fill="white"/>
    
    <!-- Center QR pattern -->
    <rect x="80" y="80" width="40" height="40" rx="4" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
    <rect x="90" y="90" width="20" height="20" rx="2" fill="white"/>
    
    <!-- Small dots -->
    <circle cx="85" cy="55" r="4" fill="url(#logoGradient)"/>
    <circle cx="115" cy="55" r="4" fill="url(#logoGradient)"/>
    <circle cx="85" cy="145" r="4" fill="url(#logoGradient)"/>
    <circle cx="115" cy="145" r="4" fill="url(#logoGradient)"/>
    
    <circle cx="55" cy="85" r="4" fill="url(#logoGradient)"/>
    <circle cx="55" cy="115" r="4" fill="url(#logoGradient)"/>
    <circle cx="145" cy="85" r="4" fill="url(#logoGradient)"/>
    <circle cx="145" cy="115" r="4" fill="url(#logoGradient)"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#logoGradient)" filter="url(#glow)">LuxQr</text>
</svg>
